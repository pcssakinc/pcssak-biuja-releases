name: Feature request / 기능 제안
description: Describe a recurring user problem before proposing a solution / 해결책보다 반복되는 사용자 문제를 먼저 알려주세요
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        PCssak Biuja keeps file safety, local processing, and a reviewable workflow ahead of feature count. A clear recurring problem and its safety implications are more useful than a long list of buttons.

        PCssak Biuja는 기능 수보다 파일 안전, 로컬 처리와 사용자가 확인할 수 있는 작업 흐름을 우선합니다. 긴 버튼 목록보다 반복되는 실제 문제와 안전에 미치는 영향을 알려주세요.
  - type: textarea
    id: problem
    attributes:
      label: User problem / 사용자 문제
      description: Who has the problem, in which file-organization workflow, and what is the practical impact? / 누가 어떤 파일 정리 흐름에서 겪으며 실제 영향은 무엇인가요?
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround / 현재 해결 방법
      description: How is the task handled safely today? / 지금은 이 작업을 어떻게 안전하게 해결하나요?
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome / 원하는 결과
      description: Describe the completed user outcome, not only a button or implementation. / 버튼이나 구현 방법보다 사용자가 끝내야 하는 결과를 설명하세요.
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Main workflow / 주요 작업 흐름
      options:
        - Scan and classification / 검사와 분류
        - Preview and review / 미리보기와 검토
        - Apply sorting plan / 정리 계획 실행
        - Collision handling / 충돌 처리
        - Work journal and history / 작업저널과 기록
        - Rollback / 되돌리기
        - Installation and updates / 설치와 업데이트
        - Accessibility or localization / 접근성 또는 번역
        - Other / 기타
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Main audience / 주요 사용자
      options:
        - General home user / 일반 가정 사용자
        - Office worker / 사무 사용자
        - Creator or freelancer / 창작자 또는 프리랜서
        - Small business / 소규모 사업자
        - IT support or administrator / IT 지원 또는 관리자
        - Other / 기타
    validations:
      required: true
  - type: textarea
    id: safety-privacy
    attributes:
      label: Safety and privacy considerations / 안전·개인정보 고려사항
      description: Could this affect overwrite protection, permanent deletion, preview accuracy, rollback, local-only processing, permissions, cloud sync, or confidential paths? / 덮어쓰기 금지·영구 삭제 금지·미리보기 정확성·되돌리기·로컬 처리·권한·클라우드 동기화·비공개 경로에 영향이 있나요?
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation / 확인
      options:
        - label: I searched existing requests and described a real recurring problem. / 기존 제안을 검색했고 실제로 반복되는 문제를 설명했습니다.
          required: true
        - label: I removed personal paths, filenames, contents, secrets, customer data, and confidential information. / 개인 경로·파일명·내용·비밀정보·고객·회사 자료를 제거했습니다.
          required: true
